<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Local Business</title>
</head>
<body>
    <!-- Heading section -->
    <h1>Contat Us</h1>
    <br>

    <!-- contact section -->
    <form action="" method="get">
        
        <!-- Name section -->
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Arjith Singh" maxlength="50" required><br>

        <br>

        <!-- Email section -->
         <label for="email">Email Address:</label>
         <input type="type" id="email" name="email" placeholder="yourmail@gmail.com" maxlength="50" required><br>

         <br>

         <!-- Phone number section -->
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" placeholder="1234567890" maxlength="10" required><br>

        <br>

        <!-- Subject section -->
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" placeholder="Type your subject" maxlength="80" required><br>
        
        <br>

        <!-- Message section -->
        <label for="message"> Message:</label>
        <input type="text" name="message" id="message" placeholder="Type your message here..." maxlength="500"> <br>

        <br>

        <!-- submit button -->
         <button type="submit">Submit</button><br>
    </form>

    <hr>
    
    <p>&copy; 2026 Local business. All rights reserved.</p>
    
</body>
</html>
