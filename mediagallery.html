<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media gallery</title>
</head>
<body>

    <!-- Heading -->
    <header>
        <h1>Media Gallery</h1>

        <!-- Bookmark link -->
        <div>
            <a href="#video-gallery">Video</a>
            <a href="#audio-gallery">Audio</a>
        </div>
    <hr>
    </header>
    

    <!-- main section -->
    <main>
        <!-- Video section -->
        <section id="video-gallery">
            <h2>Featured Videos</h2>

            <!-- First video -->
            <iframe width="560" height="315" 
            src="https://www.youtube.com/embed/g8BK42YsOlw?si=5OpAxa65kCgCiJBK" 
            title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; 
            clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            
            <!-- second video -->
            <iframe width="200" height="315"
             src="https://youtube.com/embed/9aLZOp0glH4?si=V8gEoIh1pj_08biK" frameborder="0" title="youtube video player" allowfullscreen 
             allow="accelerometer; autoplay"></iframe>
        </section>
        <br>

        <!-- Audio section -->
        <section id="audio-gallery">
            <h2>Featured audio</h2>
            <audio controls>
                <source src="audio/sample-speech-30m.mp3">
                Your browser does not support this file type
            </audio>
        </section>
    </main>
    <hr>
    
    <!-- Footer section -->
    <footer>
        <p>&copy; 2026 | GreyMacq studio Media gallery. All rights reserved</p>
    </footer> 
</body>
</html>
